<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>프레젠테이션 PDF 뷰어 (로컬 전용)</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #525659; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 상단 컨트롤 바 디자인 */
        .toolbar { 
            background: #323639; color: white; padding: 12px; 
            display: flex; gap: 15px; align-items: center; justify-content: center; 
            z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.3); 
            transition: transform 0.3s ease, opacity 0.3s ease; 
        }
        
        /* F11 전체화면 시 툴바 숨김 연동 */
        body.fullscreen-mode .toolbar { position: absolute; width: 100%; box-sizing: border-box; transform: translateY(-100%); opacity: 0; }
        body.fullscreen-mode .toolbar:hover { transform: translateY(0); opacity: 1; }
        
        .cmd-input { width: 140px; text-align: center; background: #222; color: #00ffcc; border: 2px solid #555; padding: 6px; border-radius: 4px; font-weight: bold; font-size: 14px; }
        .cmd-input:focus { border-color: #00ffcc; outline: none; }
        .info-text { font-size: 14px; color: #ccc; }

        /* PDF가 담긴 객체를 브라우저 중앙에 가득 채우는 박스 */
        .viewer-container { flex: 1; display: flex; justify-content: center; align-items: center; background: #525659; position: relative; }
        
        /* [핵심] 브라우저 내장 뷰어를 크기 조절하기 위한 스타일 */
        #pdf-object { width: 100%; height: 100%; border: none; transition: transform 0.2s ease; transform-origin: center center; }
        
        #file-input { display: none; }
        .placeholder-text { color: #ccc; text-align: center; font-size: 18px; line-height: 2.0; position: absolute; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div>
            <label for="file-input" style="padding: 6px 12px; background: #4a4a4a; color: white; border: 1px solid #666; border-radius: 4px; cursor: pointer; font-size: 14px;">📁 파일 열기 (Ctrl + O)</label>
            <input type="file" id="file-input" accept=".pdf" onchange="loadLocalFile(event)">
        </div>
        |
        <div>
            <!-- 배율 조작을 위한 만능 입력창 -->
            <input type="text" id="cmd-field" class="cmd-input" placeholder="배율 입력 (예: 10+)" onkeydown="handleCommand(event)">
        </div>
        |
        <div class="info-text">현재 배율: <span id="zoom-val">100%</span></div>
        |
        <div class="info-text">※ 이동 및 쪽수 탐색은 화면 내 우측 스크롤 바/마우스 휠을 이용하세요.</div>
    </div>

    <!-- PDF 본문 렌더링 화면 -->
    <div id="viewer" class="viewer-container">
        <div id="intro-text" class="placeholder-text">
            <strong>Ctrl + O</strong>를 눌러 PC의 PDF 파일을 불러오세요.<br>
            파일 실행 후 <strong>F11</strong>을 누르면 스크린 가득 슬라이드를 띄울 수 있습니다.
        </div>
        <!-- 여기에 PDF가 동적으로 들어갑니다 -->
    </div>

    <script>
        let currentScale = 1.0; // 기본 100% 배율 변수

        // [1] Ctrl + O 단축키 연동
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key.toLowerCase() === 'o') {
                e.preventDefault(); 
                document.getElementById('file-input').click(); 
            }
        });

        // [2] F11 전체화면 메뉴바 숨김 연동
        window.addEventListener('resize', () => {
            const isF11 = window.innerWidth === window.screen.width && window.innerHeight === window.screen.height;
            if (isF11) {
                document.body.classList.add('fullscreen-mode');
            } else {
                document.body.classList.remove('fullscreen-mode');
            }
        });

        // [3] 로컬 파일 로더 (인터넷 차단 우회 가동)
        function loadLocalFile(e) {
            const files = e.target.files;
            if (!files || files.length === 0) return;

            const file = files[0];
            if (file.type !== "application/pdf") return alert("PDF 파일만 열 수 있습니다.");

            // 인터넷 주소가 아닌, 내 PC 내부 메모리 직통 가상 임시 주소 발급 (보안 100% 우회)
            const fileObjectURL = URL.createObjectURL(file);

            // 기존 안내문 숨기기
            document.getElementById('intro-text').style.display = 'none';

            // 뷰어 영역에 브라우저 최적화 내장 객체 삽입
            const viewer = document.getElementById('viewer');
            
            // 기존 오브젝트가 있다면 제거
            const oldObj = document.getElementById('pdf-object');
            if (oldObj) oldObj.remove();

            const obj = document.createElement('object');
            obj.id = 'pdf-object';
            obj.data = fileObjectURL;
            obj.type = 'application/pdf';
            
            // 내장 뷰어 스크롤 바 강제 활성화 및 툴바 제거 최적화 매개변수 주입
            obj.innerHTML = `<iframe src="${fileObjectURL}#toolbar=0&navpanes=0" width="100%" height="100%"></iframe>`;

            viewer.appendChild(obj);
            
            // 배율 초기화
            currentScale = 1.0;
            updateZoomUI();
        }

        // [4] 만능 입력바 배율 조작 기능 (+, - 제어)
        function handleCommand(event) {
            if (event.key !== 'Enter') return;

            const targetObj = document.getElementById('pdf-object');
            if (!targetObj) return alert("파일을 먼저 열어주세요.");

            const inputField = document.getElementById('cmd-field');
            const value = inputField.value.trim();
            inputField.value = '';

            if (!value) return;

            // 배율 변경 확인 (예: 10+, 20-)
            if (value.endsWith('+') || value.endsWith('-')) {
                const sign = value.slice(-1);
                const percent = parseInt(value.slice(0, -1));
                
                if (isNaN(percent) || percent <= 0) {
                    return alert("숫자 뒤에 + 또는 -를 붙여주세요 (예: 10+)");
                }

                const offset = percent / 100; // 10% -> 0.1
                
                if (sign === '+') {
                    currentScale = Math.min(4.0, currentScale + offset); // 최대 400%
                } else {
                    currentScale = Math.max(0.3, currentScale - offset); // 최소 30%
                }

                // CSS 줌 매트릭스를 사용하여 하드웨어 가속 크기 조정 기동
                targetObj.style.transform = `scale(${currentScale})`;
                updateZoomUI();
                return;
            }

            alert("배율 변경 명령어가 아닙니다.\n숫자 뒤에 + 또는 -를 입력하고 엔터를 치세요 (예: 10+, 10-)");
        }

        function updateZoomUI() {
            document.getElementById('zoom-val').textContent = Math.round(currentScale * 100) + '%';
        }
    </script>
</body>
</html>
