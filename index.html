<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PDF Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #525659; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .toolbar { background: #323639; color: white; padding: 12px; display: flex; gap: 15px; justify-content: center; z-index: 100; transition: transform 0.3s; }
        body.fullscreen-mode .toolbar { position: absolute; width: 100%; transform: translateY(-100%); opacity: 0; }
        body.fullscreen-mode .toolbar:hover { transform: translateY(0); opacity: 1; }
        .viewer-container { flex: 1; overflow: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        canvas { background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); max-width: 100%; }
        .viewer-container.grid-mode { flex-direction: row; flex-wrap: wrap; }
        .viewer-container.grid-mode canvas { max-width: 45%; }
        .placeholder-text { color: #ccc; margin-top: 100px; text-align: center; }
    </style>
</head>
<body>
    <div class="toolbar">
        <input type="file" id="file-input" accept=".pdf" onchange="loadLocalFile(event)">
        <button onclick="zoom(0.1)">➕</button>
        <button onclick="zoom(-0.1)">➖</button>
        <button id="view-mode-btn" onclick="toggleViewMode()">🔲</button>
        <button onclick="toggleFullscreen()">📺</button>
    </div>
    <div id="viewer" class="viewer-container"></div>
    <script>
        // PDF.js 설정 및 초기화
        const pdfjsLib = window.pdfjsLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = ''; 
        let pdfDoc = null, scale = 1.2, isGridMode = false;

        function loadLocalFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function() { renderPDF(new Uint8Array(this.result)); };
            reader.readAsArrayBuffer(file);
        }

        function renderPDF(data) {
            pdfjsLib.getDocument({data: data}).promise.then(pdf => {
                pdfDoc = pdf;
                renderAll();
            });
        }

        function renderAll() {
            const viewer = document.getElementById('viewer');
            viewer.innerHTML = '';
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                pdfDoc.getPage(i).then(page => {
                    const viewport = page.getViewport({ scale: scale });
                    const canvas = document.createElement('canvas');
                    canvas.height = viewport.height; canvas.width = viewport.width;
                    viewer.appendChild(canvas);
                    page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport });
                });
            }
        }
        
        function zoom(amount) { scale = Math.max(0.4, Math.min(3.5, scale + amount)); renderAll(); }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                document.body.classList.add('fullscreen-mode');
            } else { document.exitFullscreen(); document.body.classList.remove('fullscreen-mode'); }
        }
    </script>
</body>
</html>
