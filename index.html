<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스마트 PDF 프레젠테이션 뷰어</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #525659; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 왼쪽 구석 초미니 투명 조작 바 */
        .toolbar { 
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(50, 54, 57, 0.5); padding: 6px; border-radius: 6px;
            display: flex; gap: 8px; align-items: center; opacity: 0.3; transition: opacity 0.2s;
        }
        .toolbar:hover { opacity: 1; background: rgba(50, 54, 57, 0.9); }
        .toolbar button, .toolbar label { padding: 4px 8px; background: #4a4a4a; color: white; border: 1px solid #666; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .toolbar button:hover, .toolbar label:hover { background: #5a5a5a; }
        
        /* PDF 뷰어 영역 (화면 전체 꽉 차게 설정) */
        .viewer-container { flex: 1; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        
        /* [교정 핵심] 보안 차단을 우회하여 PDF 원본을 가두는 프레임 박스 */
        #pdf-frame { width: 100%; height: 100%; border: none; transition: transform 0.1s ease; transform-origin: center center; display: none; }
        
        #file-input { display: none; }
        .placeholder-text { color: #ccc; text-align: center; font-size: 18px; line-height: 2.0; pointer-events: none; position: absolute; }
    </style>
</head>
<body>

    <!-- 왼쪽 상단 구석 초미니 메뉴 -->
    <div class="toolbar">
        <label for="file-input">📁 열기</label>
        <input type="file" id="file-input" accept=".pdf" onchange="loadLocalFile(event)">
        <button onclick="zoom(0.1)">➕ 크게</button>
        <button onclick="zoom(-0.1)">➖ 작게</button>
    </div>

    <!-- PDF 본문 렌더링 영역 -->
    <div id="viewer" class="viewer-container">
        <div id="guide-text" class="placeholder-text">
            <strong>보안 우회형 PDF 슬라이드쇼 뷰어</strong><br>
            • <strong>Ctrl + O</strong> 키나 왼쪽 구석의 📁 버튼을 눌러 PDF 파일을 불러오세요.<br>
            • 파일이 열린 후 <strong>F11</strong>을 누르면 전체화면 슬라이드쇼가 시작됩니다.
        </div>
        <!-- 브라우저 강제 주입용 임베드 객체 -->
        <embed id="pdf-frame" type="application/pdf">
    </div>

    <script>
        let scale = 1.0; // 기본 배율 변수

        // 단축키 조작 (Ctrl + O 및 크기 조절 키 매핑)
        document.addEventListener('keydown', (e) => {
            // 파일 열기 (Ctrl + O)
            if (e.ctrlKey && e.key.toLowerCase() === 'o') {
                e.preventDefault(); 
                document.getElementById('file-input').click(); 
                return;
            }

            // +, - 키 단독 입력으로 화면 크기 정밀 조절
            if (e.key === '+' || e.key === '=') { zoom(0.1); }
            if (e.key === '-') { zoom(-0.1); }
        });

        // 로컬 파일을 브라우저의 다운로드 간섭 없이 강제로 화면에 주입하는 핵심 로직
        function loadLocalFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const pdfData = event.target.result;
                const frame = document.getElementById('pdf-frame');
                
                // 브라우저의 보안 필터를 우회하여 바이너리 데이터를 웹 화면에 강제 렌더링 유도
                frame.src = pdfData;
                frame.style.display = 'block';
                
                // 초기 안내문 숨기기
                document.getElementById('guide-text').style.display = 'none';
                
                // 크기 초기화
                scale = 1.0;
                frame.style.transform = `scale(${scale})`;
            };
            
            // 파일을 주소 방식이 아닌 내부 데이터(DataURL) 스트림으로 직독직해하여 다운로드 차단 유효화
            reader.readAsDataURL(file);
        }

        // 크기 조절 제어 함수 (+10%, -10% 스케일 트랜스폼 연산)
        function zoom(amount) {
            const frame = document.getElementById('pdf-frame');
            if (!frame || frame.style.display !== 'block') return;
            
            scale = Math.max(0.4, Math.min(4.0, scale + amount));
            frame.style.transform = `scale(${scale})`;
        }
    </script>
</body>
</html>
