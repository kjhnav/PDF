<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>단축키 전용 PDF 슬라이드쇼 뷰어</title>
    <script src="https://cloudflare.com"></script>
    <style>
        /* 메뉴 바를 완전히 제거하고 화면 전체를 PDF 출력창으로만 사용합니다 */
        body { margin: 0; font-family: sans-serif; background: #525659; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 뷰어 영역 (언제나 정중앙에 정렬되며 화면이 작으면 스크롤바가 생김) */
        .viewer-container { flex: 1; overflow: auto; padding: 0; display: flex; justify-content: center; align-items: center; }
        canvas { background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 100%; height: auto; display: block; }
        
        /* 파일 선택창은 화면에서 완전히 숨깁니다 */
        #file-input { display: none; }
        
        /* 초기 안내 문구 */
        .placeholder-text { color: #ccc; text-align: center; font-size: 20px; line-height: 2.2; pointer-events: none; padding: 20px; }
        .hint-box { font-size: 14px; color: #aaa; background: #3c3f41; padding: 15px 25px; border-radius: 8px; margin-top: 20px; display: inline-block; text-align: left; }
    </style>
</head>
<body>

    <!-- 숨겨진 파일 입력 태그 -->
    <input type="file" id="file-input" accept=".pdf" onchange="loadLocalFile(event)">

    <!-- PDF 본문 화면 -->
    <div id="viewer" class="viewer-container">
        <div class="placeholder-text">
            <strong>스마트 PDF 단축키 뷰어</strong><br>
            시작하려면 아래 단축키를 사용하세요.
            <br>
            <div class="hint-box">
                ⌨️ <strong>단축키 가이드</strong><br>
                • <strong>Ctrl + O</strong> : 내 PC에서 PDF 파일 불러오기<br>
                • <strong>+ (더하기 키)</strong> : 화면 조금씩 크게 확대 (10%씩)<br>
                • <strong>- (빼기 키)</strong> : 화면 조금씩 작게 축소 (10%씩)<br>
                • <strong>방향키 (▲ / ▼)</strong> : 이전 페이지 / 다음 페이지 이동<br>
                • <strong>F11</strong> : 브라우저 자체 전체화면 (슬라이드쇼 모드)
            </div>
        </div>
    </div>

    <script>
        // 성공하셨던 코드의 원본 엔진 선언부 동일 보존
        const pdfjsLib = window.pdfjsLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = ''; 
        
        let pdfDoc = null;
        let currentPage = 1;
        let scale = 1.8; // 처음에 작게 보이던 문제를 해결하기 위해 기본 배율을 180%로 크게 고정했습니다.

        // [핵심 인터페이스] 모든 조작을 처리하는 단축키 시스템
        document.addEventListener('keydown', (e) => {
            // 1. 파일 열기 (Ctrl + O)
            if (e.ctrlKey && e.key.toLowerCase() === 'o') {
                e.preventDefault(); 
                document.getElementById('file-input').click(); 
                return;
            }

            if (!pdfDoc) return; // 파일이 열리기 전에는 아래 단축키 작동 방지

            // 2. 페이지 이동 (위/아래 방향키 및 좌/우 방향키 지원)
            if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); changePage(-1); }
            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); changePage(1); }

            // 3. 정밀 크기 조절 (+ 키와 - 키 단독 입력)
            if (e.key === '+' || e.key === '=') { // 키보드 종류에 따라 =과 +가 같이 있는 경우 대응
                scale = Math.min(4.0, scale + 0.1); // 10%씩 확대 (최대 400%)
                renderCurrentPage();
            }
            if (e.key === '-') {
                scale = Math.max(0.4, scale - 0.1); // 10%씩 축소 (최소 40%)
                renderCurrentPage();
            }
        });

        // 성공했던 로컬 파일 수신 및 데이터 로드 메커니즘 100% 동일 보존
        function loadLocalFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function() { renderPDF(new Uint8Array(this.result)); };
            reader.readAsArrayBuffer(file);
        }

        function renderPDF(data) {
            pdfjsLib.getDocument({
                data: data,
                stopAtErrors: false,
                isEvalSupported: false
            }).promise.then(pdf => {
                pdfDoc = pdf;
                currentPage = 1; // 첫 페이지 고정
                renderCurrentPage();
            }).catch(err => {
                alert("파일 로드 실패: " + err.message);
            });
        }

        // 슬라이드쇼 단일 페이지 출력 코어
        function renderCurrentPage() {
            if (!pdfDoc) return;
            const viewer = document.getElementById('viewer');
            viewer.innerHTML = ''; // 화면 리셋

            pdfDoc.getPage(currentPage).then(page => {
                const viewport = page.getViewport({ scale: scale });
                const canvas = document.createElement('canvas');
                canvas.height = viewport.height; 
                canvas.width = viewport.width;
                viewer.appendChild(canvas);
                
                page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport });
            });
        }

        // 페이지 증감 오프셋 계산 함수
        function changePage(offset) {
            if (!pdfDoc) return;
            const nextPage = currentPage + offset;
            if (nextPage >= 1 && nextPage <= pdfDoc.numPages) {
                currentPage = nextPage;
                renderCurrentPage();
            }
        }
    </script>
</body>
</html>
