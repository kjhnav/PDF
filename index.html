<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>단축키 PDF 슬라이드쇼</title>
    <script src="https://cloudflare.com"></script>
    <style>
        /* 메뉴 바를 완전히 삭제하여 화면 전체를 PDF 전용 공간으로 씁니다 */
        body { margin: 0; font-family: sans-serif; background: #525659; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .viewer-container { flex: 1; overflow: auto; padding: 0; display: flex; justify-content: center; align-items: center; }
        canvas { background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 100%; height: auto; display: block; }
        #file-input { display: none; }
        .placeholder-text { color: #ccc; text-align: center; font-size: 20px; line-height: 2.2; pointer-events: none; }
        .hint-box { font-size: 14px; color: #aaa; background: #3c3f41; padding: 15px 25px; border-radius: 8px; margin-top: 20px; display: inline-block; text-align: left; }
    </style>
</head>
<body>

    <input type="file" id="file-input" accept=".pdf" onchange="loadLocalFile(event)">

    <div id="viewer" class="viewer-container">
        <div class="placeholder-text">
            <strong>스마트 PDF 단축키 뷰어</strong><br>
            메뉴 바가 완전히 제거된 버전입니다. 아래 단축키로 제어하세요.
            <br>
            <div class="hint-box">
                ⌨️ <strong>단축키 제어 가이드</strong><br>
                • <strong>Ctrl + O</strong> : 내 PC에서 PDF 파일 불러오기<br>
                • <strong>+ (더하기 키)</strong> : 화면 10%씩 크게 확대<br>
                • <strong>- (빼기 키)</strong> : 화면 10%씩 작게 축소<br>
                • <strong>방향키 (▲ / ▼)</strong> : 이전 페이지 / 다음 페이지 이동<br>
                • <strong>F11</strong> : 브라우저 자체 전체화면 (메뉴가 없는 완벽한 슬라이드쇼)
            </div>
        </div>
    </div>

    <script>
        const pdfjsLib = window.pdfjsLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = ''; 
        
        let pdfDoc = null, currentPage = 1, scale = 1.8; // 기본 배율을 크게 설정

        // [단축키 허브]
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key.toLowerCase() === 'o') {
                e.preventDefault(); 
                document.getElementById('file-input').click(); 
                return;
            }

            if (!pdfDoc) return;

            // 방향키 페이지 이동 (위/아래 및 좌/우 모두 지원)
            if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); changePage(-1); }
            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); changePage(1); }

            // +, - 단독 입력으로 확대/축소
            if (e.key === '+' || e.key === '=') { scale = Math.min(4.0, scale + 0.1); renderCurrentPage(); }
            if (e.key === '-') { scale = Math.max(0.4, scale - 0.1); renderCurrentPage(); }
        });

        function loadLocalFile(e) {
            const file = e.target.files[0]; // 안전한 타겟팅 명시
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function() { renderPDF(new Uint8Array(this.result)); };
            reader.readAsArrayBuffer(file);
        }

        function renderPDF(data) {
            pdfjsLib.getDocument({
                data: data,
                stopAtErrors: false,
                isEvalSupported: false
            }).promise.then(pdf => {
                pdfDoc = pdf;
                currentPage = 1;
                renderCurrentPage();
            }).catch(err => alert("파일 로드 실패: " + err.message));
        }

        function renderCurrentPage() {
            if (!pdfDoc) return;
            const viewer = document.getElementById('viewer');
            viewer.innerHTML = ''; 

            pdfDoc.getPage(currentPage).then(page => {
                const viewport = page.getViewport({ scale: scale });
                const canvas = document.createElement('canvas');
                canvas.height = viewport.height; canvas.width = viewport.width;
                viewer.appendChild(canvas);
                page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport });
            });
        }

        function changePage(offset) {
            if (!pdfDoc) return;
            const nextPage = currentPage + offset;
            if (nextPage >= 1 && nextPage <= pdfDoc.numPages) {
                currentPage = nextPage;
                renderCurrentPage();
            }
        }
    </script>
</body>
</html>
