<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스마트 PDF 프레젠테이션 뷰어</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #525659; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 상단 툴바 */
        .toolbar { background: #323639; color: white; padding: 12px; display: flex; gap: 15px; justify-content: center; align-items: center; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.3); transition: transform 0.3s, opacity 0.3s; }
        
        /* [교정] F11 전체화면 모드 시 툴바가 하늘 위로 확실하게 숨겨집니다 */
        body.fullscreen-mode .toolbar { position: absolute; top: 0; left: 0; width: 100%; box-sizing: border-box; transform: translateY(-100%); opacity: 0; }
        /* 전체화면이더라도 마우스를 천장 끝까지 붙이면 메뉴 바가 부드럽게 내려옵니다 */
        body.fullscreen-mode .toolbar:hover { transform: translateY(0); opacity: 1; }
        
        .toolbar button, .toolbar label { padding: 6px 12px; background: #4a4a4a; color: white; border: 1px solid #666; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .toolbar button:hover, .toolbar label:hover { background: #5a5a5a; }
        
        /* 만능 명령어 입력창 */
        .cmd-input { width: 130px; text-align: center; background: #222; color: #00ffcc; border: 2px solid #555; padding: 6px; border-radius: 4px; font-weight: bold; font-size: 14px; }
        .cmd-input:focus { border-color: #00ffcc; outline: none; }
        .info-text { font-size: 14px; color: #ccc; }

        /* 뷰어 영역 (가운데 정렬 및 스크롤 바 자동 제어) */
        .viewer-container { flex: 1; overflow: auto; padding: 20px; display: flex; justify-content: center; align-items: center; }
        canvas { background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 100%; height: auto; display: block; }
        #file-input { display: none; }
        .placeholder-text { color: #ccc; text-align: center; font-size: 18px; line-height: 2.0; pointer-events: none; }
    </style>
</head>
<body>
    <div class="toolbar">
        <label for="file-input">📁 파일 열기 (Ctrl + O)</label>
        <input type="file" id="file-input" accept=".pdf" onchange="loadLocalFile(event)">
        
        |
        <input type="text" id="cmd-field" class="cmd-input" placeholder="숫자, +, - 입력" onkeydown="handleCommand(event)">
        |

        <div class="info-text">페이지: <span id="current-page">0</span> / <span id="total-pages">0</span></div>
        <div class="info-text">배율: <span id="zoom-val">100%</span></div>
        
        <button onclick="changePage(-1)">▲ 이전</button>
        <button onclick="changePage(1)">▼ 다음</button>
    </div>
    
    <div id="viewer" class="viewer-container">
        <div class="placeholder-text">
            <strong>Ctrl + O</strong>를 누르거나 파일 열기 버튼을 클릭하여 PDF를 불러오세요.<br>
            파일이 열린 상태에서 <strong>F11</strong>을 누르면 전체화면 슬라이드쇼가 시작됩니다.
        </div>
    </div>

    <script>
        const pdfjsLib = window.pdfjsLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = ''; 
        
        let pdfDoc = null, scale = 1.0, currentPage = 1;

        // [단축키 제어 시스템]
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key.toLowerCase() === 'o') {
                e.preventDefault(); 
                document.getElementById('file-input').click(); 
                return;
            }

            if (document.activeElement === document.getElementById('cmd-field')) return;

            if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); changePage(-1); }
            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); changePage(1); }
        });

        // [F11 전체화면 모니터링 기능 강화]
        window.addEventListener('resize', () => {
            // 브라우저의 내부 해상도가 모니터 실제 해상도와 일치하는지 정밀 대조하여 F11 판정
            const isF11 = window.innerWidth === window.screen.width && window.innerHeight === window.screen.height;
            if (isF11) {
                document.body.classList.add('fullscreen-mode');
            } else {
                document.body.classList.remove('fullscreen-mode');
            }
            
            // 전체화면 변경 시 화면 리사이징에 맞춰 배율을 다시 자동 최적화합니다
            if (pdfDoc) {
                fitToWidth();
            }
        });

        function loadLocalFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function() { renderPDF(new Uint8Array(this.result)); };
            reader.readAsArrayBuffer(file);
        }

        function renderPDF(data) {
            pdfjsLib.getDocument({
                data: data,
                stopAtErrors: false,
                isEvalSupported: false
            }).promise.then(pdf => {
                pdfDoc = pdf;
                currentPage = 1;
                document.getElementById('total-pages').textContent = pdf.numPages;
                
                // [신규] 파일을 열자마자 브라우저 너비에 맞추는 계산 함수 작동
                fitToWidth();
            }).catch(err => {
                alert("보안 우회 로딩 실패: " + err.message);
            });
        }

        // [신규] 현재 화면 너비에 맞게 배율(Scale)을 자동으로 계산해 주는 기능
        function fitToWidth() {
            if (!pdfDoc) return;
            pdfDoc.getPage(currentPage).then(page => {
                const viewerContainer = document.getElementById('viewer');
                
                // 패딩 값을 제외한 순수 뷰어 내부 너비 구하기
                const containerWidth = viewerContainer.clientWidth - 40; 
                
                // 배율이 1일 때의 원본 PDF 너비 구하기
                const unscaledViewport = page.getViewport({ scale: 1.0 });
                
                // 컨테이너 너비와 원본 너비를 비교하여 딱 맞는 비율 계산
                scale = containerWidth / unscaledViewport.width;
                
                // 최대/최소 배율 상한선 제한 처리 (너무 과하게 커지거나 작아짐 방지)
                scale = Math.max(0.4, Math.min(2.5, scale));
                
                renderCurrentPage();
            });
        }

        // 슬라이드쇼 단일 페이지 렌더링
        function renderCurrentPage() {
            if (!pdfDoc) return;
            const viewer = document.getElementById('viewer');
            viewer.innerHTML = ''; 

            pdfDoc.getPage(currentPage).then(page => {
                const viewport = page.getViewport({ scale: scale });
                const canvas = document.createElement('canvas');
                canvas.height = viewport.height; canvas.width = viewport.width;
                viewer.appendChild(canvas);
                
                document.getElementById('current-page').textContent = currentPage;
                document.getElementById('zoom-val').textContent = Math.round(scale * 100) + '%';
                
                page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport });
            });
        }

        // 만능 명령어 조작 (10+, 10-, 숫자엔터)
        function handleCommand(event) {
            if (event.key !== 'Enter') return;
            if (!pdfDoc) return alert("파일을 먼저 열어주세요.");

            const inputField = document.getElementById('cmd-field');
            const value = inputField.value.trim();
            inputField.value = ''; 

            if (!value) return;

            // 1. 배율 수동 가감 조작 (예: 10+, 10-)
            if (value.endsWith('+') || value.endsWith('-')) {
                const sign = value.slice(-1);
                const percent = parseInt(value.slice(0, -1));
                if (isNaN(percent) || percent <= 0) return alert("숫자 뒤에 +/- 기호를 붙여주세요. (예: 10+)");

                const scaleOffset = percent / 100;
                scale = sign === '+' ? Math.min(3.5, scale + scaleOffset) : Math.max(0.4, scale - scaleOffset);
                renderCurrentPage();
                return;
            }

            // 2. 특정 쪽수로 바로 워프 점프 (예: 10 엔터)
            const targetPage = parseInt(value);
            if (!isNaN(targetPage)) {
                if (targetPage < 1 || targetPage > pdfDoc.numPages) return alert(`1부터 ${pdfDoc.numPages}페이지 사이로 입력해주세요.`);
                currentPage = targetPage;
                renderCurrentPage();
                return;
            }

            alert("올바른 형식이 아닙니다.");
        }

        function changePage(offset) {
            if (!pdfDoc) return;
            const nextPage = currentPage + offset;
            if (nextPage >= 1 && nextPage <= pdfDoc.numPages) {
                currentPage = nextPage;
                renderCurrentPage();
            }
        }
    </script>
</body>
</html>
